# HAProxy Configuration for Microservices Load Balancing
# Production-grade configuration with health checks, SSL termination, and monitoring

global
    # Basic settings
    daemon
    user haproxy
    group haproxy
    pidfile /var/run/haproxy.pid
    
    # Logging
    log stdout local0
    log stdout local1 notice
    
    # Security
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    
    # Performance tuning
    maxconn 4096
    tune.ssl.default-dh-param 2048
    
    # SSL settings
    ssl-default-bind-ciphers ECDHE+AESGCM:ECDHE+CHACHA20:DHE+AESGCM:DHE+CHACHA20:!aNULL:!MD5:!DSS
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    # Default settings for all proxies
    mode http
    option httplog
    option dontlognull
    option log-health-checks
    option redispatch
    
    # Timeouts
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    timeout http-request 10s
    timeout http-keep-alive 10s
    timeout check 10s
    
    # Error handling
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# Statistics and monitoring
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 30s
    stats admin if TRUE
    stats show-legends
    stats show-desc Bus Tracking System Load Balancer

# Frontend for API Gateway
frontend api_frontend
    bind *:80
    bind *:443 ssl crt /etc/ssl/certs/bustracking.pem
    
    # Redirect HTTP to HTTPS
    redirect scheme https if !{ ssl_fc }
    
    # Security headers
    http-response set-header X-Frame-Options DENY
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-XSS-Protection "1; mode=block"
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains"
    
    # Rate limiting
    stick-table type ip size 100k expire 30s store http_req_rate(10s)
    http-request track-sc0 src
    http-request deny if { sc_http_req_rate(0) gt 100 }
    
    # Routing rules
    acl is_user_service path_beg /users /admin
    acl is_bus_service path_beg /buses
    acl is_route_service path_beg /routes
    acl is_assignment_service path_beg /assignments
    acl is_location_service path_beg /locations
    acl is_storage_service path_beg /storage
    acl is_monitoring_service path_beg /health /monitoring
    
    use_backend user_service if is_user_service
    use_backend bus_service if is_bus_service
    use_backend route_service if is_route_service
    use_backend assignment_service if is_assignment_service
    use_backend location_service if is_location_service
    use_backend storage_service if is_storage_service
    use_backend monitoring_service if is_monitoring_service
    
    # Default backend
    default_backend api_backend

# Backend for User Service
backend user_service
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    
    # Health check settings
    option httpchk
    http-check connect
    http-check send meth GET uri /health ver HTTP/1.1 hdr Host localhost
    http-check expect status 200
    
    # Server instances
    server user-service-1 user-service-1:3001 check inter 5s rise 2 fall 3
    server user-service-2 user-service-2:3001 check inter 5s rise 2 fall 3
    server user-service-3 user-service-3:3001 check inter 5s rise 2 fall 3 backup
    
    # Circuit breaker
    option redispatch
    retries 3
    
    # Timeout settings
    timeout server 30s
    timeout connect 5s

# Backend for Bus Service
backend bus_service
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    
    server bus-service-1 bus-service-1:3002 check inter 5s rise 2 fall 3
    server bus-service-2 bus-service-2:3002 check inter 5s rise 2 fall 3
    server bus-service-3 bus-service-3:3002 check inter 5s rise 2 fall 3 backup

# Backend for Route Service
backend route_service
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    
    server route-service-1 route-service-1:3003 check inter 5s rise 2 fall 3
    server route-service-2 route-service-2:3003 check inter 5s rise 2 fall 3
    server route-service-3 route-service-3:3003 check inter 5s rise 2 fall 3 backup

# Backend for Assignment Service
backend assignment_service
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    
    server assignment-service-1 assignment-service-1:3004 check inter 5s rise 2 fall 3
    server assignment-service-2 assignment-service-2:3004 check inter 5s rise 2 fall 3
    server assignment-service-3 assignment-service-3:3004 check inter 5s rise 2 fall 3 backup

# Backend for Location Service
backend location_service
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    
    server location-service-1 location-service-1:3005 check inter 5s rise 2 fall 3
    server location-service-2 location-service-2:3005 check inter 5s rise 2 fall 3
    server location-service-3 location-service-3:3005 check inter 5s rise 2 fall 3 backup

# Backend for Storage Service
backend storage_service
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    
    server storage-service-1 storage-service-1:3006 check inter 5s rise 2 fall 3
    server storage-service-2 storage-service-2:3006 check inter 5s rise 2 fall 3
    server storage-service-3 storage-service-3:3006 check inter 5s rise 2 fall 3 backup

# Backend for Monitoring Service
backend monitoring_service
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    
    server monitoring-service-1 monitoring-service-1:3007 check inter 5s rise 2 fall 3
    server monitoring-service-2 monitoring-service-2:3007 check inter 5s rise 2 fall 3

# Default backend for unmatched requests
backend api_backend
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    
    server api-gateway-1 api-gateway-1:8080 check inter 5s rise 2 fall 3
    server api-gateway-2 api-gateway-2:8080 check inter 5s rise 2 fall 3

# WebSocket support for real-time features
frontend websocket_frontend
    bind *:8080
    mode http
    
    # WebSocket routing
    acl is_websocket hdr(Upgrade) -i websocket
    acl is_websocket hdr_beg(Host) -i ws
    
    use_backend websocket_backend if is_websocket
    default_backend api_backend

backend websocket_backend
    mode http
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    
    # WebSocket specific settings
    timeout tunnel 3600s
    timeout server 3600s
    timeout client 3600s
    
    server websocket-service-1 websocket-service-1:3008 check inter 5s rise 2 fall 3
    server websocket-service-2 websocket-service-2:3008 check inter 5s rise 2 fall 3

# Health check backend for load balancer itself
backend health_check
    mode http
    option httpchk GET /health
    http-check expect status 200
    
    server health-check-1 localhost:8404 check
