apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bus-tracking-ingress
  namespace: bus-tracking-system
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.bustracking.com
    - ws.bustracking.com
    secretName: bus-tracking-tls
  rules:
  - host: api.bustracking.com
    http:
      paths:
      - path: /users
        pathType: Prefix
        backend:
          service:
            name: user-service
            port:
              number: 3001
      - path: /buses
        pathType: Prefix
        backend:
          service:
            name: bus-service
            port:
              number: 3002
      - path: /routes
        pathType: Prefix
        backend:
          service:
            name: route-service
            port:
              number: 3003
      - path: /assignments
        pathType: Prefix
        backend:
          service:
            name: assignment-service
            port:
              number: 3004
      - path: /locations
        pathType: Prefix
        backend:
          service:
            name: location-service
            port:
              number: 3005
      - path: /storage
        pathType: Prefix
        backend:
          service:
            name: storage-service
            port:
              number: 3006
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: monitoring-service
            port:
              number: 3007
      - path: /monitoring
        pathType: Prefix
        backend:
          service:
            name: monitoring-service
            port:
              number: 3007
  - host: ws.bustracking.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: websocket-service
            port:
              number: 3008
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bus-tracking-network-policy
  namespace: bus-tracking-system
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: bus-tracking-system
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: bus-tracking-system
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379
